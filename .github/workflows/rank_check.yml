name: Weekly Rank Check

on:
  schedule:
    - cron: '0 14 * * 1'  # Every Monday at 9am EST (14:00 UTC)
  workflow_dispatch:        # Allow manual runs from GitHub UI

jobs:
  check-ranks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run rank tracker
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: python rank_tracker.py

      - name: Commit and push updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rank_history.json rank_tracker.html
          git diff --staged --quiet || git commit -m "Weekly rank update $(date +'%Y-%m-%d')"
          git push
