<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SERP Rank Tracker - maffei-structure.com</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #f4f4f0;
    --surface: #ffffff;
    --border: #ddddd8;
    --accent1: #2a7d3a;
    --accent2: #1a6b8a;
    --accent3: #c0392b;
    --text: #1a1a1a;
    --muted: #999990;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 40px 32px;
  }
  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 48px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  .site-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(36px, 5vw, 64px);
    letter-spacing: 0.04em;
    line-height: 1;
  }
  h1 span { color: var(--accent1); }
  .last-updated {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-align: right;
  }
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 32px;
  }
  .tab {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 8px 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .tab.active {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 40px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 24px;
    position: relative;
    overflow: hidden;
  }
  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }
  .stat-card:nth-child(1)::before { background: var(--accent1); }
  .stat-card:nth-child(2)::before { background: var(--accent2); }
  .stat-card:nth-child(3)::before { background: var(--accent3); }
  .stat-query {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 12px;
    line-height: 1.4;
  }
  .stat-rank {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px;
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-label {
    font-size: 11px;
    color: var(--muted);
    font-weight: 300;
  }
  .section { margin-bottom: 40px; }
  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  .section-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--muted);
  }
  .legend { display: flex; gap: 20px; flex-wrap: wrap; }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
  .chart-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 32px;
  }
  canvas { max-height: 320px; }
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; }
  thead tr { border-bottom: 1px solid var(--border); }
  th {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    padding: 14px 20px;
    text-align: left;
    font-weight: 400;
  }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(0,0,0,0.02); }
  td { padding: 14px 20px; font-size: 13px; font-weight: 300; }
  td.rank-cell {
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    font-size: 14px;
  }
  td.rank-cell.q1 { color: var(--accent1); }
  td.rank-cell.q2 { color: var(--accent2); }
  td.rank-cell.q3 { color: var(--accent3); }
  td.rank-cell.none { color: var(--muted); }
  td.date-cell {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }
  .query-tag {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 2px 8px;
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .loc-tag {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 2px 8px;
    background: var(--bg);
    color: var(--muted);
  }
  @media (max-width: 640px) {
    .stats-row { grid-template-columns: 1fr; }
    .legend { display: none; }
  }
</style>
</head>
<body>
<header>
  <div>
    <div class="site-label">maffei-structure.com/work/sf_concrete/</div>
    <h1>SERP <span>RANK</span> TRACKER</h1>
  </div>
  <div class="last-updated" id="lastUpdated"></div>
</header>

<div class="tabs" id="tabs"></div>
<div class="stats-row" id="statsRow"></div>

<div class="section">
  <div class="section-header">
    <span class="section-title">Rank Over Time — lower is better</span>
    <div class="legend" id="legend"></div>
  </div>
  <div class="chart-wrap">
    <canvas id="rankChart"></canvas>
  </div>
</div>

<div class="section">
  <div class="section-header">
    <span class="section-title">Full History</span>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Date</th><th>Location</th><th>Query</th><th>Rank</th></tr></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<script>
  const COLORS = {
    "concrete building screening program": { color: "#2a7d3a", cls: "q1" },
    "concrete building screening":          { color: "#1a6b8a", cls: "q2" },
    "concrete screening":                   { color: "#c0392b", cls: "q3" },
  };

  const LOCATIONS = ["San Francisco, CA", "California"];
  const allData = [{"date": "2026-03-06", "query": "concrete building screening", "rank": 6, "url": "maffei-structure.com/work/sf_concrete/", "location": "San Francisco, CA"}, {"date": "2026-03-06", "query": "concrete building screening program", "rank": 5, "url": "maffei-structure.com/work/sf_concrete/", "location": "San Francisco, CA"}, {"date": "2026-03-06", "query": "concrete screening", "rank": 3, "url": "maffei-structure.com/work/sf_concrete/", "location": "San Francisco, CA"}, {"date": "2026-03-12", "query": "concrete building screening", "rank": 5, "url": "maffei-structure.com/work/sf_concrete/", "location": "San Francisco, CA"}, {"date": "2026-03-12", "query": "concrete building screening program", "rank": 5, "url": "maffei-structure.com/work/sf_concrete/", "location": "San Francisco, CA"}, {"date": "2026-03-12", "query": "concrete screening", "rank": null, "url": "maffei-structure.com/work/sf_concrete/", "location": "San Francisco, CA"}, {"date": "2026-03-19", "query": "concrete building screening", "rank": 6, "url": "maffei-structure.com/work/sf_concrete/", "location": "San Francisco, CA"}, {"date": "2026-03-19", "query": "concrete building screening program", "rank": 6, "url": "maffei-structure.com/work/sf_concrete/", "location": "San Francisco, CA"}, {"date": "2026-03-19", "query": "concrete screening", "rank": 7, "url": "maffei-structure.com/work/sf_concrete/", "location": "San Francisco, CA"}, {"date": "2026-03-26", "location": "California", "query": "concrete building screening", "rank": 7, "url": "maffei-structure.com/work/sf_concrete/"}, {"date": "2026-03-26", "location": "California", "query": "concrete building screening program", "rank": 7, "url": "maffei-structure.com/work/sf_concrete/"}, {"date": "2026-03-26", "location": "California", "query": "concrete screening", "rank": null, "url": "maffei-structure.com/work/sf_concrete/"}, {"date": "2026-03-26", "location": "San Francisco, CA", "query": "concrete building screening", "rank": 6, "url": "maffei-structure.com/work/sf_concrete/"}, {"date": "2026-03-26", "location": "San Francisco, CA", "query": "concrete building screening program", "rank": 6, "url": "maffei-structure.com/work/sf_concrete/"}, {"date": "2026-03-26", "location": "San Francisco, CA", "query": "concrete screening", "rank": 3, "url": "maffei-structure.com/work/sf_concrete/"}, {"date": "2026-03-26", "location": "San Francisco, CA", "query": "concrete building screening program", "rank": 6, "url": "maffei-structure.com/work/sf_concrete/"}, {"date": "2026-03-26", "location": "San Francisco, CA", "query": "concrete building screening", "rank": 6, "url": "maffei-structure.com/work/sf_concrete/"}, {"date": "2026-03-26", "location": "San Francisco, CA", "query": "concrete screening", "rank": 3, "url": "maffei-structure.com/work/sf_concrete/"}, {"date": "2026-03-26", "location": "California", "query": "concrete building screening program", "rank": 7, "url": "maffei-structure.com/work/sf_concrete/"}, {"date": "2026-03-26", "location": "California", "query": "concrete building screening", "rank": 7, "url": "maffei-structure.com/work/sf_concrete/"}, {"date": "2026-03-26", "location": "California", "query": "concrete screening", "rank": null, "url": "maffei-structure.com/work/sf_concrete/"}, {"date": "2026-03-30", "location": "San Francisco, CA", "query": "concrete building screening program", "rank": 6, "url": "maffei-structure.com/work/sf_concrete/"}, {"date": "2026-03-30", "location": "San Francisco, CA", "query": "concrete building screening", "rank": 6, "url": "maffei-structure.com/work/sf_concrete/"}, {"date": "2026-03-30", "location": "San Francisco, CA", "query": "concrete screening", "rank": 6, "url": "maffei-structure.com/work/sf_concrete/"}, {"date": "2026-03-30", "location": "California", "query": "concrete building screening program", "rank": 6, "url": "maffei-structure.com/work/sf_concrete/"}, {"date": "2026-03-30", "location": "California", "query": "concrete building screening", "rank": 8, "url": "maffei-structure.com/work/sf_concrete/"}, {"date": "2026-03-30", "location": "California", "query": "concrete screening", "rank": null, "url": "maffei-structure.com/work/sf_concrete/"}];
  let activeLocation = LOCATIONS[0];
  let chart = null;

  function renderTabs() {
    document.getElementById('tabs').innerHTML = LOCATIONS.map(loc =>
      '<div class="tab' + (loc === activeLocation ? ' active' : '') + '" onclick="setLocation(\'' + loc + '\')">' + loc + '</div>'
    ).join('');
  }

  function setLocation(loc) {
    activeLocation = loc;
    renderTabs();
    renderStats();
    renderChart();
  }

  function renderLastUpdated() {
    const dates = allData.map(d => d.date).sort();
    const latest = dates[dates.length - 1];
    document.getElementById('lastUpdated').innerHTML =
      'Last updated<br><strong style="color:var(--text);font-family:\'DM Mono\',monospace">' + latest + '</strong>';
  }

  function renderStats() {
    const queries = Object.keys(COLORS);
    const row = document.getElementById('statsRow');
    row.innerHTML = '';
    queries.forEach((q, i) => {
      const entries = allData
        .filter(d => d.query === q && d.location === activeLocation)
        .sort((a, b) => b.date.localeCompare(a.date));
      const latest = entries[0];
      const rank = latest ? latest.rank : null;
      const color = COLORS[q].color;
      row.innerHTML +=
        '<div class="stat-card">' +
        '<div class="stat-query">' + q + '</div>' +
        '<div class="stat-rank" style="color:' + color + '">' + (rank != null ? rank : '—') + '</div>' +
        '<div class="stat-label">' + (rank != null ? 'current rank · ' + activeLocation : 'not in top 100') + '</div>' +
        '</div>';
    });
  }

  function renderChart() {
    const queries = Object.keys(COLORS);
    const filtered = allData.filter(d => d.location === activeLocation);
    const dates = [...new Set(filtered.map(d => d.date))].sort();
    const datasets = queries.map(q => {
      const color = COLORS[q].color;
      return {
        label: q,
        data: dates.map(date => {
          const e = filtered.find(d => d.date === date && d.query === q);
          return (e && e.rank != null) ? e.rank : null;
        }),
        borderColor: color,
        backgroundColor: color + '22',
        pointBackgroundColor: color,
        pointRadius: 5,
        pointHoverRadius: 7,
        tension: 0.3,
        spanGaps: true,
        fill: false,
        borderWidth: 2,
      };
    });
    document.getElementById('legend').innerHTML = queries.map(q =>
      '<div class="legend-item"><div class="legend-dot" style="background:' + COLORS[q].color + '"></div>' + q + '</div>'
    ).join('');
    if (chart) chart.destroy();
    chart = new Chart(document.getElementById('rankChart'), {
      type: 'line',
      data: { labels: dates, datasets: datasets },
      options: {
        responsive: true,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#ffffff',
            borderColor: '#ddd',
            borderWidth: 1,
            titleColor: '#999',
            bodyColor: '#1a1a1a',
            titleFont: { family: 'DM Mono', size: 10 },
            bodyFont: { family: 'DM Mono', size: 12 },
            callbacks: { label: function(ctx) { return ' ' + ctx.dataset.label + ': #' + (ctx.parsed.y != null ? ctx.parsed.y : 'n/a'); } }
          }
        },
        scales: {
          x: {
            ticks: { color: '#aaa', font: { family: 'DM Mono', size: 10 } },
            grid: { color: '#ebebeb' },
            border: { color: '#ddd' }
          },
          y: {
            reverse: true,
            min: 1,
            ticks: {
              color: '#aaa',
              font: { family: 'DM Mono', size: 10 },
              stepSize: 1,
              callback: function(v) { return '#' + v; }
            },
            grid: { color: '#ebebeb' },
            border: { color: '#ddd' },
            title: { display: true, text: 'Rank (lower = better)', color: '#aaa', font: { family: 'DM Mono', size: 10 } }
          }
        }
      }
    });
  }

  function renderTable() {
    const sorted = [...allData].sort((a, b) =>
      b.date.localeCompare(a.date) || (a.location || '').localeCompare(b.location || '') || a.query.localeCompare(b.query)
    );
    document.getElementById('tableBody').innerHTML = sorted.map(d => {
      const cls = (COLORS[d.query] || { cls: 'none' }).cls;
      return '<tr>' +
        '<td class="date-cell">' + d.date + '</td>' +
        '<td><span class="loc-tag">' + (d.location || '—') + '</span></td>' +
        '<td><span class="query-tag">' + d.query + '</span></td>' +
        '<td class="rank-cell ' + (d.rank != null ? cls : 'none') + '">' + (d.rank != null ? '#' + d.rank : '—') + '</td>' +
        '</tr>';
    }).join('');
  }

  renderLastUpdated();
  renderTabs();
  renderStats();
  renderChart();
  renderTable();
</script>
</body>
</html>
